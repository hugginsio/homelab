# yaml-language-server: $schema=https://raw.githubusercontent.com/cilium/cilium/refs/heads/main/install/kubernetes/cilium/values.schema.json
# https://docs.cilium.io/en/stable/

cgroup:
  autoMount:
    enabled: false
  hostRoot: "/sys/fs/cgroup"

gatewayAPI:
  enabled: true

hubble:
  relay:
    enabled: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 30s
  metrics:
    dashboards:
      enabled: true
      label: grafana
      labelValue: dashboard
    serviceMonitor:
      enabled: true
      interval: 30s
  ui:
    enabled: true
    ingress:
      enabled: false

ipam:
  mode: kubernetes

k8sServiceHost: localhost
k8sServicePort: 7445
kubeProxyReplacement: true

l2announcements:
  enabled: true

loadBalancer:
  algorithm: maglev

operator:
  replicas: 2

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - IPC_LOCK
      - KILL
      - NET_ADMIN
      - NET_BIND_SERVICE
      - NET_RAW
      - SETGID
      - SETUID
      - SYS_ADMIN
      - SYS_RESOURCE
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
