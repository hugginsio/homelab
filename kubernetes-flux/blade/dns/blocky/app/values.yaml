# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.3.0/charts/library/common/values.schema.json
# https://bjw-s-labs.github.io/helm-charts/docs/app-template/

defaultPodOptions:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: blocky
            topologyKey: "kubernetes.io/hostname"
          weight: 100
  automountServiceAccountToken: false
  securityContext:
    fsGroup: 65534
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 65534
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
controllers:
  app:
    enabled: true
    type: deployment
    replicas: 3
    labels:
      kube.huggins.io/cache-db: "1"
    containers:
      app:
        image:
          repository: "ghcr.io/0xerr0r/blocky"
          tag: "v0.29.0@sha256:a6d99f323d3036a99a3767a52ad612f4d8f3f31167492bfc14d4ea57b24cdfd0"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
              - NET_BIND_SERVICE
            drop:
              - ALL
          readOnlyRootFilesystem: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 256Mi
        env:
          - name: BLOCKY_CONFIG_FILE
            value: "/app/configuration.yaml"
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - "/app/blocky"
                  - "healthcheck"
              initialDelaySeconds: 30
    strategy: RollingUpdate
    rollingUpdate:
      surge: 3
service:
  metrics:
    controller: app
    enabled: true
    type: ClusterIP
    ports:
      metrics:
        enabled: true
        port: 4000
        protocol: TCP
  resolver:
    controller: app
    type: LoadBalancer
    annotations:
      lbipam.cilium.io/ips: "10.0.2.36"
      tailscale.com/expose: "true"
      tailscale.com/hostname: "dns-${CLUSTER_NAME}"
      tailscale.com/tags: "tag:dns"
    ports:
      dns-udp:
        port: 53
        protocol: UDP
        targetPort: 53
      dns-tcp:
        port: 53
        protocol: TCP
        targetPort: 53
serviceMonitor:
  app:
    enabled: true
    serviceName: blocky-metrics
    endpoints:
      - port: metrics
        scheme: http
        path: "/metrics"
        interval: 10s
persistence:
  configuration:
    type: configMap
    name: blocky
    globalMounts:
      - path: "/app/configuration.yaml"
        subPath: "configuration.yaml"
        readOnly: true
  tmp:
    type: emptyDir
