# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/tuppr.home-operations.com/talosupgrade_v1alpha1.json

apiVersion: tuppr.home-operations.com/v1alpha1
kind: TalosUpgrade
metadata:
  name: mini
spec:
  talos:
    version: v1.13.0
  policy:
    rebootMode: powercycle
  maintenance:
    windows:
      - start: "0 7 * * 6"
        duration: "1h"
        timezone: "America/Chicago"
