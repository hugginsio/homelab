# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/gitrepository_v1.json

apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: homelab
  namespace: flux-system
spec:
  interval: 99h
  url: "https://github.com/hugginsio/homelab.git"
  ref:
    branch: main
  secretRef:
    name: github-key
  ignore: |-
    /*
    !/kubernetes-flux/
    /kubernetes-flux/**/helmfil*.yaml
    /kubernetes-flux/*/ks.yaml
    /kubernetes-flux/Taskfile.yaml
    /kubernetes-flux/bootstrap/
    /kubernetes-flux/policy/
    /kubernetes-flux/shared/**/*.md
  sparseCheckout:
    - kubernetes-flux

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/gitrepository_v1.json

apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: homelab-staging
  namespace: flux-system
spec:
  interval: 99h
  url: "https://github.com/hugginsio/homelab-staging.git"
  ref:
    branch: main
  secretRef:
    name: github-key
  ignore: |-
    /*
    !/kubernetes-flux/
    /kubernetes-flux/*/ks.yaml
    /kubernetes-flux/Taskfile.yaml
    /kubernetes-flux/bootstrap/
    /kubernetes-flux/policy/
    /kubernetes-flux/shared/**/*.md
    /kubernetes-flux/shared/**/helmfil*.yaml
  sparseCheckout:
    - kubernetes-flux
