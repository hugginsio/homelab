# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/fluxcd.controlplane.io/fluxinstance_v1.json

apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcile: "enabled"
    fluxcd.controlplane.io/reconcileEvery: "1h"
    fluxcd.controlplane.io/reconcileTimeout: "3m"
spec:
  distribution:
    registry: "ghcr.io/fluxcd"
    version: "2.x"
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    # TODO: set up notifications
    # - notification-controller
  cluster:
    domain: cluster.internal
    multitenant: false
    networkPolicy: true
    size: small
    type: kubernetes
  commonMetadata:
    labels:
      app.kubernetes.io/name: flux
  kustomize:
    # TODO: copy over patches from old kustomize installation
    patches: []
