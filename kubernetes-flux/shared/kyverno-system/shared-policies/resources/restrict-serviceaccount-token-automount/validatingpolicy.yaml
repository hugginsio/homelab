# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/policies.kyverno.io/validatingpolicy_v1.json

apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  annotations:
    policies.kyverno.io/description: Requires automountServiceAccountToken to be explicitly disabled.
    policies.kyverno.io/severity: medium
    policies.kyverno.io/title: Restrict automounting the service account token.
  name: restrict-serviceaccount-token-automount
spec:
  autogen:
    validatingAdmissionPolicy:
      enabled: true
    podControllers:
      controllers:
        - cronjobs
        - deployments
        - jobs
        - statefulsets
  matchConstraints:
    resourceRules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - pods
  validationActions:
    - Audit
  validations:
    - expression: "object.spec.?automountServiceAccountToken.orValue(true) == false"
      message: "Containers must have automountServiceAccountToken set to false."
