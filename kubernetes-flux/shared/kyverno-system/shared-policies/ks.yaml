# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno-system-shared-policies
  namespace: flux-system
spec:
  targetNamespace: kyverno-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: shared-policies
  path: ./kubernetes-flux/shared/kyverno-system/shared-policies/resources
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: homelab
    namespace: flux-system
  interval: 3h
  retryInterval: 1m
  timeout: 5m
