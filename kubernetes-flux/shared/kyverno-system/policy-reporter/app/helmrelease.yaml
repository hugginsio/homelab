# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app policy-reporter
  namespace: &ns kyverno-system
spec:
  interval: 3h
  releaseName: *app
  chart:
    spec:
      chart: *app
      version: 3.7.4
      sourceRef:
        kind: HelmRepository
        name: policy-reporter
        namespace: *ns
  install:
    crds: CreateReplace
    remediation:
      retries: &retries 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: *retries
  valuesFrom:
    - kind: ConfigMap
      name: policy-reporter-chart-values
