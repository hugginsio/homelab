# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage-system-resources
  namespace: flux-system
spec:
  targetNamespace: storage-system
  path: ./kubernetes-flux/hci-sting/storage-system/resources/resources
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: homelab
    namespace: flux-system
  interval: 3h
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: storage-system-garage-operator
