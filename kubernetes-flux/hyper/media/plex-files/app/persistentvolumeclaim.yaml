# yaml-language-server: $schema# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/core/persistentvolumeclaim_v1.json

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-files
spec:
  accessModes:
    # you better mount this R/O outside this StatefulSet
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: longhorn
