# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json
# https://bjw-s-labs.github.io/helm-charts/docs/app-template/

defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    fsGroup: 65534
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 65534
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault

controllers:
  app:
    enabled: true
    type: deployment
    replicas: 2
    labels:
      kube.huggins.io/cache-db: "1"
    containers:
      app:
        image:
          repository: "ghcr.io/0xerr0r/blocky"
          tag: "v0.33.0@sha256:96c4ee1d4abee3e81475796403ffde0dfd0c53a6e263e2c35c867ba5563535d4"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
              - NET_BIND_SERVICE
            drop:
              - ALL
          readOnlyRootFilesystem: true
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 256Mi
        env:
          - name: BLOCKY_CONFIG_FILE
            value: "/app/configuration.yaml"
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - "/app/blocky"
                  - "healthcheck"
              initialDelaySeconds: 5
    strategy: RollingUpdate
    rollingUpdate:
      surge: 1
service:
  metrics:
    controller: app
    enabled: true
    type: ClusterIP
    ports:
      metrics:
        enabled: true
        port: 4000
        protocol: TCP
  resolver:
    controller: app
    type: LoadBalancer
    loadBalancerClass: io.cilium/node
    annotations:
      tailscale.com/expose: "true"
      tailscale.com/hostname: "dns-${CLUSTER_NAME}"
      tailscale.com/tags: "tag:dns"
    ports:
      dns-udp:
        port: 53
        protocol: UDP
        targetPort: 53
      dns-tcp:
        port: 53
        protocol: TCP
        targetPort: 53
persistence:
  configuration:
    type: configMap
    name: blocky
    globalMounts:
      - path: "/app/configuration.yaml"
        subPath: "configuration.yaml"
        readOnly: true
  tmp:
    type: emptyDir
