# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name vms
spec:
  interval: 3h
  releaseName: *name
  chart:
    spec:
      chart: victoria-metrics-single
      version: 0.42.0
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
  install:
    remediation:
      retries: &retries 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: *retries
  valuesFrom:
    - kind: ConfigMap
      name: vms-chart-values
