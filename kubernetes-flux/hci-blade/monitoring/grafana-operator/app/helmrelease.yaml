# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name grafana-operator
spec:
  interval: 3h
  releaseName: *name
  chart:
    spec:
      chart: grafana-operator
      version: 5.22.2
      sourceRef:
        kind: HelmRepository
        name: grafana
  install:
    remediation:
      retries: &retries 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: *retries
  valuesFrom:
    - kind: ConfigMap
      name: grafana-operator-chart-values
