# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name spegel
spec:
  interval: 3h
  releaseName: *name
  chart:
    spec:
      chart: *name
      version: 0.7.3
      sourceRef:
        kind: HelmRepository
        name: spegel
  install:
    remediation:
      retries: &retries 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: *retries
  valuesFrom:
    - kind: ConfigMap
      name: spegel-chart-values
