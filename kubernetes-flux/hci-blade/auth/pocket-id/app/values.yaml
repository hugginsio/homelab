# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json
# https://bjw-s-labs.github.io/helm-charts/docs/app-template/

defaultPodOptions:
  automountServiceAccountToken: false
  hostUsers: false
  securityContext:
    fsGroup: 65534
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 65534
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
controllers:
  app:
    enabled: true
    type: statefulset
    containers:
      app:
        image:
          repository: "ghcr.io/pocket-id/pocket-id"
          tag: "v2.11.0-distroless@sha256:446624a84743c29f93db2ffbbe19f9059fd9741e0cb2516d31efcc764e131835"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        env:
          ANALYTICS_DISABLED: "true"
          APP_NAME: "Huggins Cloud"
          APP_URL: "https://${SUBDOMAIN_IDP}.${DOMAIN_INTERNAL}"
          TRUST_PROXY: "true"
          TZ: ${TIMEZONE}
          UI_CONFIG_DISABLED: "true"
          UPDATE_CHECK_DISABLED: "true"
        envFrom:
          - secretRef:
              name: pocket-id-encryption-key
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: "/healthz"
                port: 1411
service:
  app:
    controller: app
    ports:
      http:
        port: 1411
route:
  app:
    hostnames:
      - "${SUBDOMAIN_IDP}.${DOMAIN_INTERNAL}"
    parentRefs:
      - name: domain-internal
        namespace: gateway-system
        sectionName: default
    rules:
      - backendRefs:
          - identifier: app
            port: 1411
persistence:
  data:
    accessMode: ReadWriteOnce
    globalMounts:
      - path: "/app/data"
        subPath: backend
    size: 5Gi
    storageClass: longhorn
  tmp:
    type: emptyDir
  var:
    type: emptyDir
