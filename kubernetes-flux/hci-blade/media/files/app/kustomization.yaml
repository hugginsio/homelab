# yaml-language-server: $schema=https://json.schemastore.org/kustomization

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # - "./ciliumnetworkpolicy.yaml"
  - "./externalsecret.yaml"
  - "./helmrelease.yaml"
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: files-chart-values
    files:
      - values.yaml
  - name: files-config
    files:
      - config.yaml
