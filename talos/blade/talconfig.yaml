# https://budimanjojo.github.io/talhelper/latest/
# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/refs/tags/v3.1.5/pkg/config/schemas/talconfig.json

clusterName: blade
endpoint: https://kube.blade.lab.home.arpa:6443
additionalApiServerCertSans: &sans
  - "kube.blade.lab.home.arpa"
allowSchedulingOnControlPlanes: true

talosVersion: "v1.13.0"
kubernetesVersion: "v1.36.0"

controlPlane:
  certSANs: *sans
  schematic:
    customization:
      extraKernelArgs:
        - "talos.dashboard.disabled=1"
      systemExtensions:
        officialExtensions:
          - "siderolabs/intel-ucode" # Intel microcode
          - "siderolabs/iscsi-tools" # Storage tools
          - "siderolabs/util-linux-tools" # Selection of Linux utils
  machineSpec:
    secureboot: false
  nameservers:
    - 10.0.2.1
  volumes:
    - name: EPHEMERAL
      encryption:
        provider: luks2
        keys:
          - slot: 1
            lockToState: true
            static:
              passphrase: ${ENCRYPTION_PASSPHRASE}
              # - name: STATE
              # NOTE: these things don't have a TPM. I'm cooked.

nodes:
  - hostname: one
    certSANs: *sans
    controlPlane: true
    ipAddress: 10.0.2.31
    installDiskSelector:
      serial: "0x8b3378d0"
    nodeLabels:
      topology.kubernetes.io/instance-type: smol
      topology.kubernetes.io/region: arkansas
    userVolumes:
      - name: data
        provisioning:
          diskSelector:
            match: disk.wwid == "naa.500a0751e9c8903a"
          grow: true
          minSize: 100GiB
        encryption:
          provider: luks2
          keys:
            - slot: 1
              lockToState: true
              static:
                passphrase: ${ENCRYPTION_PASSPHRASE}
  - hostname: two
    certSANs: *sans
    controlPlane: true
    ipAddress: 10.0.2.32
    installDiskSelector:
      serial: "0x3bb80c00"
    nodeLabels:
      topology.kubernetes.io/instance-type: smol
      topology.kubernetes.io/region: arkansas
    userVolumes:
      - name: data
        provisioning:
          diskSelector:
            match: disk.wwid == "naa.500a0751e8896492"
          grow: true
          minSize: 100GiB
        encryption:
          provider: luks2
          keys:
            - slot: 1
              lockToState: true
              static:
                passphrase: ${ENCRYPTION_PASSPHRASE}
  - hostname: three
    certSANs: *sans
    controlPlane: true
    ipAddress: 10.0.2.33
    installDiskSelector:
      serial: "0xcbf921d0"
    nodeLabels:
      topology.kubernetes.io/instance-type: smol
      topology.kubernetes.io/region: arkansas
    userVolumes:
      - name: data
        provisioning:
          diskSelector:
            match: disk.wwid == "naa.500a0751e68fc07f"
          grow: true
          minSize: 100GiB
        encryption:
          provider: luks2
          keys:
            - slot: 1
              lockToState: true
              static:
                passphrase: ${ENCRYPTION_PASSPHRASE}
patches:
  - |-
    cluster:
      apiServer:
        admissionControl:
          - name: PodSecurity
            configuration:
              apiVersion: pod-security.admission.config.k8s.io/v1alpha1
              defaults:
                audit: privileged
                audit-version: latest
                enforce: privileged
                enforce-version: latest
                warn: restricted
                warn-version: latest
              exemptions:
                namespaces: []
                runtimeClasses: []
                usernames: []
              kind: PodSecurityConfiguration
        extraArgs: # https://kubernetes.io/docs/reference/command-line-tools-reference/kube-apiserver/
          max-mutating-requests-inflight: "100"
          max-requests-inflight: "200"
        resources:
          requests:
            cpu: 200m
            memory: 1024Mi
          limits:
            memory: 1024Mi
      controllerManager:
        extraArgs: # https://kubernetes.io/docs/reference/command-line-tools-reference/kube-controller-manager/
          concurrent-deployment-syncs: "3"
          concurrent-replicaset-syncs: "3"
          kube-api-burst: "20"
          kube-api-qps: "15"
      etcd:
        extraArgs: # https://etcd.io/docs/v3.6/op-guide/configuration/
          auto-compaction-mode: periodic
          auto-compaction-retention: 10m
          snapshot-count: "5000"
      network:
        cni:
          # NOTE: modify this for temporary clusters
          name: none
      proxy:
        # NOTE: modify this for temporary clusters
        disabled: true
      scheduler:
        extraArgs: # https://kubernetes.io/docs/reference/command-line-tools-reference/kube-scheduler/
          kube-api-burst: "20"
          kube-api-qps: "15"
    machine:
      features:
        kubernetesTalosAPIAccess:
          allowedKubernetesNamespaces:
            - "system-upgrade"
          allowedRoles:
            - "os:admin"
          enabled: true
      files:
        - path: /etc/cri/conf.d/20-customization.part
          op: create
          content: |
            [plugins."io.containerd.cri.v1.images"]
              discard_unpacked_layers = false
      kubelet:
        extraArgs:
          # NOTE: modify this for temporary clusters
          rotate-server-certificates: true
      network:
        kubespan:
          enabled: false
      sysctls:
        user.max_user_namespaces: "11255"
